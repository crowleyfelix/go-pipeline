name: fanout-example
description: Execute multiple nested pipelines concurrently and aggregate their outputs.
steps:
- type: fanout
  params:
    concurrency: '2'
    pipelines:
    - name: 'pipe1'
      id: 'pipe1'
      steps:
      - type: log
        params:
          message: 'Running pipeline 1'
      - id: pipe-set-1
        type: set
        params:
          pipe: 1
      - type: wait
        params:
          duration: '5s'
    - name: 'pipe2'
      id: 'pipe2'
      steps:
      - type: log
        params:
          message: 'Running pipeline 2'
      - id: pipe-set-2
        type: set
        params:
          pipe: 2
      - type: wait
        params:
          duration: '3s'
    - name: 'pipe3'
      id: 'pipe3'
      steps:
      - type: log
        params:
          message: 'Running pipeline 3'
      - id: pipe-set-3
        type: set
        params:
          pipe: 3
      - type: wait
        params:
          duration: '2s'
- type: log
  params:
    message: '{{ variableGet . "pipe1.pipe-set-1" "pipe" }} - {{ variableGet . "pipe2.pipe-set-2" "pipe" }} - {{ variableGet . "pipe3.pipe-set-3" "pipe" }}'
