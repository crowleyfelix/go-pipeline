name: set-example
description: Set and update scope variables across sequential steps.
steps:
- id: 'setup'
  type: set
  params:
    counter: '1'
- type: log
  params:
    message: '{{ printf "Counter value is %s" (variableGet . "setup" "counter") }}'
- id: 'setup'
  type: set
  params:
    counter: '{{ add (variableGet . "setup" "counter") 10 }}'
- type: log
  params:
    message: '{{ printf "Counter value is %s" (variableGet . "setup" "counter") }}'